<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Headwaters Provisions — Website Directions</title>
<link rel="stylesheet" href="shared.css" />
<style>
  html, body { margin: 0; padding: 0; background: #1a1a1a; }
  body { font-family: 'Inter', sans-serif; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="d1-river-source.jsx"></script>
<script type="text/babel" src="d2-heady-trip.jsx"></script>
<script type="text/babel" src="d3-smoke-shop-74.jsx"></script>
<script type="text/babel" src="d4-nwa-zine.jsx"></script>

<script type="text/babel">
  const { useState } = React;

  function App() {
    return (
      <DesignCanvas
        title="Headwaters Provisions"
        subtitle="Full website redesign · 4 directions × 3 pages each"
      >
        <DCSection id="d1" title="Direction 1 — River Source" subtitle="Earthy boutique. Deep river green, cream paper, gold. Fraunces + Inter. The headwaters metaphor as a literal source.">
          <DCArtboard id="d1-home" label="Home" width={1440} height={2360}><RSHome /></DCArtboard>
          <DCArtboard id="d1-shop" label="Shop" width={1440} height={1980}><RSShop /></DCArtboard>
          <DCArtboard id="d1-visit" label="Visit" width={1440} height={820}><RSVisit /></DCArtboard>
        </DCSection>

        <DCSection id="d2" title="Direction 2 — Heady Trip" subtitle="Psychedelic counterculture. Violet, lime, magenta. Shrikhand + Bricolage. Big swirly type, gradients, marquee.">
          <DCArtboard id="d2-home" label="Home" width={1440} height={2080}><HTHome /></DCArtboard>
          <DCArtboard id="d2-shop" label="Shop" width={1440} height={1640}><HTShop /></DCArtboard>
          <DCArtboard id="d2-visit" label="Visit" width={1440} height={920}><HTVisit /></DCArtboard>
        </DCSection>

        <DCSection id="d3" title="Direction 3 — Smoke Shop '74" subtitle="Retro 70s revival. Burnt orange, mustard, avocado, kraft brown. Bowlby SC + Fraunces italic. Stripes, sun rays, tilted polaroids.">
          <DCArtboard id="d3-home" label="Home" width={1440} height={2200}><SSHome /></DCArtboard>
          <DCArtboard id="d3-shop" label="Shop" width={1440} height={1760}><SSShop /></DCArtboard>
          <DCArtboard id="d3-visit" label="Visit" width={1440} height={1080}><SSVisit /></DCArtboard>
        </DCSection>

        <DCSection id="d4" title="Direction 4 — NWA Zine" subtitle="Playful, irreverent, Ozarks-zine. Newsprint cream, red bleed, true blue. Archivo Black + Caveat + Special Elite. Cut-paper collage, classifieds.">
          <DCArtboard id="d4-home" label="Home" width={1440} height={2380}><NLHome /></DCArtboard>
          <DCArtboard id="d4-shop" label="Shop" width={1440} height={1820}><NLShop /></DCArtboard>
          <DCArtboard id="d4-visit" label="Visit" width={1440} height={1080}><NLVisit /></DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
